<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#725a39", "on-primary": "#ffffff",
          "primary-container": "#d2b48c", "on-primary-container": "#5b4526",
          "surface": "#fff8f3", "on-surface": "#1f1b15",
          "surface-variant": "#eae1d7", "on-surface-variant": "#4d453c",
          "surface-container": "#f6ece3", "surface-container-high": "#f0e7dd",
          "surface-container-low": "#fbf2e8",
          "outline": "#7f766a", "outline-variant": "#d1c5b8",
          "background": "#fff8f3", "error": "#ba1a1a"
        },
        fontFamily: { "display": ["Plus Jakarta Sans"] },
        fontSize: {
          "display": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "600" }],
          "h1": ["32px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }],
          "h2": ["24px", { lineHeight: "1.3", fontWeight: "500" }],
          "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
          "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
          "label-caps": ["12px", { lineHeight: "1.0", letterSpacing: "0.05em", fontWeight: "600" }]
        }
      }
    }
  }
</script>
<style>
  body { background-color: #FAF9F6; min-height: 100dvh; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .distraction-free:focus { outline: none; box-shadow: none; }
</style>
</head>
<body class="bg-background text-on-surface font-['Plus_Jakarta_Sans'] antialiased min-h-screen flex flex-col">

<header class="bg-[#FAF9F6] border-b border-stone-200/50 shadow-[0_4px_20px_rgba(74,69,62,0.05)] sticky top-0 z-50">
  <div class="flex justify-between items-center w-full px-6 py-4">
    <div class="flex items-center gap-4">
      <a href="/" class="text-stone-400 hover:bg-stone-100 transition-colors p-2 rounded-full active:scale-95">
        <span class="material-symbols-outlined">close</span>
      </a>
    </div>
    <div class="text-xl font-medium italic text-stone-800 tracking-tight">The Curator</div>
    <div class="flex items-center gap-3">
      <button type="submit" form="write-form" class="bg-primary-container text-on-primary-container px-6 py-2 rounded-full text-[14px] font-semibold transition-transform duration-200 active:scale-95 shadow-sm">
        {{ '저장' if post else 'Publish' }}
      </button>
    </div>
  </div>
</header>

<main class="flex-grow pt-8 pb-8 px-5 md:px-6 overflow-y-auto">
  <form id="write-form" method="POST" action="{{ '/post/' ~ post.id ~ '/edit' if post else '/write' }}" class="max-w-[800px] mx-auto w-full">

    <div class="mb-3 flex flex-wrap gap-2">
      <span class="px-3 py-1 bg-primary/10 text-primary text-[12px] tracking-widest font-semibold rounded-full uppercase">JOURNAL</span>
    </div>

    <div class="mb-8">
      <input
        name="title"
        type="text"
        required
        placeholder="Title"
        spellcheck="false"
        value="{{ post.title if post else '' }}"
        class="w-full bg-transparent border-none p-0 text-[48px] leading-[1.1] tracking-[-0.02em] font-semibold distraction-free placeholder:text-stone-300 text-on-surface"
      />
    </div>

    <div class="sticky top-[88px] z-40 mb-8 bg-[#FAF9F6]/80 backdrop-blur-sm py-2 border-y border-stone-200/30 flex items-center gap-6 text-on-surface-variant overflow-x-auto">
      <button type="button" class="hover:text-primary transition-colors"><span class="material-symbols-outlined">format_bold</span></button>
      <button type="button" class="hover:text-primary transition-colors"><span class="material-symbols-outlined">format_italic</span></button>
      <button type="button" class="hover:text-primary transition-colors"><span class="material-symbols-outlined">format_quote</span></button>
      <div class="h-4 w-[1px] bg-outline-variant"></div>
      <button type="button" class="hover:text-primary transition-colors"><span class="material-symbols-outlined">list</span></button>
    </div>

    <textarea
      name="content"
      required
      placeholder="Tell your story..."
      spellcheck="true"
      class="w-full bg-transparent border-none p-0 text-[18px] leading-[1.6] distraction-free placeholder:text-stone-300 min-h-[400px] resize-none text-on-surface"
    >{{ post.content if post else '' }}</textarea>

  </form>
</main>

<footer class="md:fixed bottom-0 left-0 w-full bg-transparent pointer-events-none px-6 py-4">
  <div class="max-w-[1120px] mx-auto flex justify-start pointer-events-auto">
    <div class="bg-[#FAF9F6]/90 backdrop-blur shadow-sm border border-stone-200/50 rounded-full px-4 py-2 flex items-center gap-4">
      <div class="flex items-center gap-2 text-on-surface-variant">
        <span class="material-symbols-outlined text-[18px]">history_edu</span>
        <span class="text-[12px] tracking-widest font-semibold uppercase" id="word-count">0 WORDS</span>
      </div>
    </div>
  </div>
</footer>

<script>
  const textarea = document.querySelector('textarea[name="content"]');
  const wordCount = document.getElementById('word-count');
  textarea.addEventListener('input', () => {
    const words = textarea.value.trim().split(/\s+/).filter(w => w).length;
    wordCount.textContent = words + ' WORDS';
  });
</script>

</body>
</html>
