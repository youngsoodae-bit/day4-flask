<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#725a39", "on-primary": "#ffffff",
          "primary-container": "#d2b48c", "on-primary-container": "#5b4526",
          "surface": "#fff8f3", "on-surface": "#1f1b15",
          "surface-variant": "#eae1d7", "on-surface-variant": "#4d453c",
          "surface-container": "#f6ece3", "surface-container-high": "#f0e7dd",
          "surface-container-low": "#fbf2e8",
          "outline": "#7f766a", "outline-variant": "#d1c5b8",
          "background": "#fff8f3", "error": "#ba1a1a"
        },
        fontFamily: { "display": ["Plus Jakarta Sans"] },
        fontSize: {
          "display": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "600" }],
          "h1": ["32px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }],
          "h2": ["24px", { lineHeight: "1.3", fontWeight: "500" }],
          "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
          "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
          "label-caps": ["12px", { lineHeight: "1.0", letterSpacing: "0.05em", fontWeight: "600" }]
        }
      }
    }
  }
</script>
<style>
  body { background-color: #FAF9F6; min-height: 100dvh; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .editorial-pull-quote { border-left: 4px solid #D2B48C; padding-left: 24px; margin: 40px 0; }
</style>
</head>
<body class="font-['Plus_Jakarta_Sans'] text-on-surface">

<nav class="fixed top-0 left-0 w-full z-50 bg-[#FAF9F6] border-b border-stone-200/50 shadow-[0_4px_20px_rgba(74,69,62,0.05)]">
  <div class="flex justify-between items-center w-full px-6 py-4 max-w-[1120px] mx-auto">
    <div class="flex items-center gap-4">
      <a href="/" class="text-stone-400 hover:bg-stone-100 transition-colors p-2 rounded-full active:scale-95">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
    </div>
    <a href="/" class="text-xl font-medium italic text-stone-800 tracking-tight">The Curator</a>
    <div class="w-10"></div>
  </div>
</nav>

<main class="pt-24 pb-32 px-5 md:px-6 max-w-[800px] mx-auto">
  <header class="mb-8">
    <div class="flex items-center gap-2 mb-4">
      <span class="bg-[#D2B48C]/10 text-primary px-3 py-1 rounded-full text-[12px] tracking-widest font-semibold uppercase">Journal</span>
    </div>
    <h1 class="font-display text-display text-on-surface mb-8">{{ post.title }}</h1>
    <div class="flex items-center gap-4 mb-8">
      <div>
        <p class="text-[13px] text-on-surface-variant italic">{{ post.created_at }}</p>
      </div>
    </div>
  </header>

  <article class="text-body-lg text-on-surface-variant leading-relaxed whitespace-pre-wrap">
    {{ post.content }}
  </article>

  <section class="mt-12 pt-8 border-t border-stone-200/50 flex flex-wrap gap-4 items-center">
    <a href="/" class="bg-transparent border border-primary text-primary px-8 py-3 rounded-lg text-[16px] flex items-center gap-2 transition-all duration-200 hover:bg-[#F5F5DC] hover:-translate-y-0.5 active:scale-95">
      <span class="material-symbols-outlined text-[20px]">arrow_back</span>
      목록으로
    </a>
  </section>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#FAF9F6]/90 backdrop-blur-md flex justify-around items-center pt-3 pb-8 px-4 rounded-t-2xl border-t border-stone-100 shadow-[0_-8px_30px_rgba(210,180,140,0.12)] md:hidden">
  <a href="/" class="flex flex-col items-center text-stone-900 bg-[#D2B48C]/10 rounded-full px-4 py-1">
    <span class="material-symbols-outlined">auto_stories</span>
    <span class="text-[11px] font-medium tracking-wide uppercase mt-1">Journal</span>
  </a>
  <a href="/write" class="flex flex-col items-center text-stone-400 hover:text-stone-600 transition-colors">
    <span class="material-symbols-outlined">edit_note</span>
    <span class="text-[11px] font-medium tracking-wide uppercase mt-1">Compose</span>
  </a>
</nav>

</body>
</html>
