<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#5e604d",
                        "error": "#ba1a1a",
                        "tertiary": "#5e5f5d",
                        "secondary-fixed-dim": "#c8c8b0",
                        "on-error": "#ffffff",
                        "outline-variant": "#d1c5b8",
                        "tertiary-container": "#b9b9b6",
                        "surface-tint": "#725a39",
                        "surface-bright": "#fff8f3",
                        "inverse-primary": "#e1c299",
                        "on-primary-container": "#5b4526",
                        "inverse-surface": "#343029",
                        "outline": "#7f766a",
                        "surface-container": "#f6ece3",
                        "primary-fixed": "#feddb3",
                        "on-secondary-container": "#636451",
                        "surface-container-high": "#f0e7dd",
                        "secondary-container": "#e1e1c9",
                        "on-primary-fixed": "#281801",
                        "on-secondary-fixed": "#1b1d0e",
                        "on-secondary": "#ffffff",
                        "primary-container": "#d2b48c",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#f8efe5",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#eae1d7",
                        "surface": "#fff8f3",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#1a1c1a",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#464745",
                        "tertiary-fixed": "#e3e2e0",
                        "surface-container-low": "#fbf2e8",
                        "on-surface": "#1f1b15",
                        "background": "#fff8f3",
                        "primary": "#725a39",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#4d453c",
                        "surface-dim": "#e1d9cf",
                        "secondary-fixed": "#e4e4cc",
                        "on-secondary-fixed-variant": "#474836",
                        "on-primary-fixed-variant": "#584324",
                        "tertiary-fixed-dim": "#c7c6c4",
                        "primary-fixed-dim": "#e1c299",
                        "on-tertiary-container": "#484a48",
                        "surface-variant": "#eae1d7",
                        "on-background": "#1f1b15"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "stack-md": "32px",
                        "container-max": "1120px",
                        "stack-lg": "64px",
                        "gutter": "24px",
                        "margin-mobile": "20px",
                        "stack-sm": "12px"
                    },
                    "fontFamily": {
                        "body-md": ["Plus Jakarta Sans"],
                        "h1": ["Plus Jakarta Sans"],
                        "h2": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-caps": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "h2": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                        "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #FAF9F6;
        }
        .editor-container {
            min-height: calc(100vh - 180px);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-background selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-[#FAF9F6] dark:bg-stone-950 docked full-width top-0 sticky z-50 border-b border-stone-100 dark:border-stone-900 shadow-[0_4px_20px_rgba(74,69,62,0.05)]">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto font-['Plus_Jakarta_Sans'] antialiased tracking-tight">
<button class="text-stone-400 hover:opacity-80 transition-opacity active:scale-95 duration-200 ease-in-out">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="text-xl font-semibold text-stone-800 dark:text-stone-100 italic">The Curator</h1>
<button class="bg-primary text-on-primary px-5 py-1.5 rounded-full font-label-caps text-label-caps hover:opacity-90 active:scale-95 transition-all shadow-sm">
                Publish
            </button>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 py-8">
<!-- Editor Canvas -->
<div class="editor-container flex flex-col gap-6">
<!-- Metadata & Context Section -->
<div class="flex items-center gap-3 mb-4">
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a thoughtful person in soft natural lighting, professional and artistic photography style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpJEapoKB6aLSGp1Hsvs2a_6FscFqzaCbcdcsm7OMiMf4vi4LvCc5YasOMMaf9uKqpuwba3Z1rt3I8aebLPHxTphOrxYAbOZJ5J5bD_4S7W-6YFNY_klbe822f3QPh3sCzUciN2xKboKQp5sDduR2vZ7MQZOY70no1ghUtcxQa2nwntFmBj0F4nqi7blp-1x2ZxRTfpS9FRhj-3q0T7U2Yz6fYsaDMGCO7Z-8wGUk2qXQ1_New9363HrOTRF4sro0688Kc_hROiQ"/>
</div>
<div class="flex flex-col">
<span class="text-label-caps font-label-caps text-on-surface">Alex Rivera</span>
<span class="text-[10px] text-stone-400 font-medium uppercase tracking-widest">Drafting in Personal Collection</span>
</div>
</div>
<!-- Title Input -->
<div class="relative">
<textarea class="w-full bg-transparent border-none focus:ring-0 font-display text-display text-on-surface placeholder:text-stone-200 resize-none p-0 overflow-hidden" oninput='this.style.height = "";this.style.height = this.scrollHeight + "px"' placeholder="Enter a title..." rows="1"></textarea>
</div>
<!-- Tags/Category Chip Selection (Soft Minimalism) -->
<div class="flex gap-2 overflow-x-auto no-scrollbar py-2">
<span class="inline-flex items-center px-3 py-1 bg-primary/10 rounded-full text-label-caps font-label-caps text-primary border border-primary/5 whitespace-nowrap">
                    Add Tags
                    <span class="material-symbols-outlined text-[14px] ml-1" data-icon="add">add</span>
</span>
<span class="inline-flex items-center px-3 py-1 bg-secondary-container/30 rounded-full text-label-caps font-label-caps text-secondary whitespace-nowrap">
                    Reflections
                </span>
<span class="inline-flex items-center px-3 py-1 bg-secondary-container/30 rounded-full text-label-caps font-label-caps text-secondary whitespace-nowrap">
                    Minimalism
                </span>
</div>
<!-- Main Content Area -->
<div class="mt-4">
<textarea class="w-full bg-transparent border-none focus:ring-0 font-body-lg text-body-lg text-on-surface-variant placeholder:text-stone-300 resize-none p-0 min-h-[400px] leading-relaxed" placeholder="Begin your narrative..."></textarea>
</div>
<!-- Pull Quote Tooltip Suggestion (Brand Identity) -->
<div class="border-l-4 border-primary-container pl-6 py-4 my-8 bg-surface-container-low/50 rounded-r-lg italic text-stone-500 font-body-lg">
                "Design is not just what it looks like and feels like. Design is how it works."
                <div class="mt-2 text-label-caps font-label-caps text-stone-400">— Sample Pull Quote</div>
</div>
</div>
</main>
<!-- Bottom Toolbar for Formatting (Focused Context) -->
<div class="fixed bottom-20 left-1/2 -translate-x-1/2 w-[calc(100%-40px)] max-w-sm z-50">
<div class="bg-white/80 backdrop-blur-xl border border-stone-100 rounded-full shadow-[0_8px_30px_rgba(210,180,140,0.12)] flex items-center justify-around px-6 py-3 text-stone-500">
<button class="hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="format_bold">format_bold</span>
</button>
<button class="hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="format_italic">format_italic</span>
</button>
<button class="hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="image">image</span>
</button>
<button class="hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="link">link</span>
</button>
<div class="w-[1px] h-4 bg-stone-200"></div>
<button class="hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="settings_ethernet">settings_ethernet</span>
</button>
</div>
</div>
<!-- BottomNavBar (Hidden on focussed write screen per "Relevance Check") -->
<!-- However, the instructions say ONLY suppress if the page intent is linear/transactional or has a "close" action. This page has a "close" action. So I suppress the BottomNavBar as requested by the "Shell Visibility & Relevance" rule for focused tasks. -->
<!-- Spacer for Bottom Toolbar -->
<div class="h-32"></div>
</body></html>
